<svg width="300" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Vertical axis -->
  <line x1="5" y1="30" x2="5" y2="370" stroke="black" stroke-width="2" />

  <!-- Box plot elements -->
  <!-- Whiskers -->
  <line x1="100" y1="50" x2="100" y2="120" stroke="gray" stroke-width="2" />
  <line x1="100" y1="280" x2="100" y2="320" stroke="gray" stroke-width="2" />

  <!-- Interquartile range (IQR) -->
  <rect x="50" y="120" width="100" height="160" fill="#ADD8E6" stroke="black" stroke-width="2" />

  <!-- Median line -->
  <line x1="50" y1="200" x2="150" y2="200" stroke="red" stroke-width="2" />

  <!-- Outliers -->
  <circle cx="100" cy="30" r="4" fill="purple" />
  <circle cx="100" cy="360" r="4" fill="purple" />

  <!-- Labels with arrows -->
  <!-- Whiskers Label -->
  <text x="170" y="65" font-family="Arial" font-size="12" fill="black">Whiskers</text>
  <line x1="160" y1="60" x2="120" y2="60" stroke="black" stroke-width="1" marker-end="url(#arrow)" />

  <!-- IQR Label -->
  <text x="170" y="180" font-family="Arial" font-size="12" fill="black">Interquartile Range (IQR)</text>
  <line x1="160" y1="180" x2="120" y2="180" stroke="black" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Median Label -->
  <text x="170" y="205" font-family="Arial" font-size="12" fill="black">Median</text>
  <line x1="160" y1="200" x2="120" y2="200" stroke="black" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Outliers Label -->
  <text x="170" y="35" font-family="Arial" font-size="12" fill="black">Outliers</text>
  <line x1="160" y1="30" x2="110" y2="30" stroke="black" stroke-width="1" marker-end="url(#arrow)" />

  <text x="170" y="365" font-family="Arial" font-size="12" fill="black">Outliers</text>
  <line x1="160" y1="360" x2="110" y2="360" stroke="black" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="black" />
    </marker>
  </defs>
</svg>
