<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulatie: De steekproevenverdeling</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #fdf6ee;
    color: #2d1a00;
    min-height: 100vh;
    padding: 16px;
  }

  /* ── Header with logo ── */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .logo {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: #2d1a00;
  }

  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 14px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── Controls sidebar ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 1px 4px rgba(200,100,0,.10);
  }

  .card h2 {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #b86000;
    margin-bottom: 10px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 7px 10px;
    transition: background 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }

  .btn-dist {
    background: #fff0dc;
    color: #7a3e00;
    text-align: left;
  }
  .btn-dist.active {
    background: darkorange;
    color: #fff;
  }
  .btn-dist:hover:not(.active) { background: #ffe0b2; }

  label {
    font-size: 0.82rem;
    color: #555;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  input[type=radio], input[type=checkbox] { accent-color: darkorange; }

  select {
    width: 100%;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1.5px solid #f5c87a;
    font-size: 0.85rem;
    color: #333;
    background: #fffaf4;
    cursor: pointer;
  }

  .draw-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .btn-draw {
    background: darkorange;
    color: #fff;
    font-size: 0.8rem;
    padding: 7px 4px;
  }
  .btn-draw:hover { background: #cc7000; }
  .btn-draw:disabled { background: #ccc; cursor: not-allowed; }
  .btn-clear {
    background: #e63946;
    color: #fff;
    width: 100%;
    margin-top: 4px;
    font-size: 0.82rem;
  }
  .btn-clear:hover { background: #c1121f; }
  .btn-clear:disabled { background: #ccc; cursor: not-allowed; }

  .toggle-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-count {
    font-size: 0.8rem;
    color: #777;
    text-align: center;
    margin-top: 4px;
  }
  .stat-count span { font-weight: 700; color: darkorange; }

  /* ── Charts panel ── */
  .charts {
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;   /* needed so the overlay canvas is positioned within this column */
  }

  .panel {
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px 12px;
    box-shadow: 0 1px 4px rgba(200,100,0,.10);
    position: relative;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .panel-title {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: darkorange;
  }

  .panel-stats {
    font-size: 0.78rem;
    color: #555;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .panel-stats .stat b { color: #2d1a00; }

  .chart-wrap {
    position: relative;
    height: 160px;
  }

  /* Custom distribution hint */
  #pop-canvas-wrap {
    position: relative;
    cursor: crosshair;
  }
  .custom-hint {
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 0.7rem;
    color: #aaa;
    pointer-events: none;
    display: none;
  }
  body.custom-mode .custom-hint { display: block; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="site-header">
  <!-- BMS logo (inline SVG) -->
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="BMS logo">
    <circle cx="50" cy="50" r="50" fill="darkorange"/>
    <text x="50" y="66" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="35" font-weight="bold" fill="white">BMS</text>
  </svg>
  <h1><span style="color: darkorange">Simulatie:</span> De steekproevenverdeling</h1>
</div>

<div class="app">

  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar">

    <div class="card">
      <h2>Vorm van de populatie</h2>
      <div class="btn-group">

        <label><input type="radio" name="n" value="16"> <i>n</i> = 16</label>
        <label><input type="radio" name="n" value="20"> <i>n</i> = 20</label>

        <button class="btn-draw" id="btn10"    onclick="drawSamples(10)">Trek 10</button>
        <button class="btn-draw" id="btn1000"  onclick="drawSamples(1000)">Trek 1 000</button>

  </div><!-- /sidebar -->

  <!-- ═══ CHARTS ═══ -->
  <div class="charts" id="chartsCol">

    <!-- Panel 1: Population -->

      <div class="panel-header">
        <span class="panel-title">Populatie</span>
        <div class="panel-stats" id="popStats"></div>
      </div>
      <div class="chart-wrap" id="pop-canvas-wrap">
        <canvas id="popChart"></canvas>
        <div class="custom-hint">Klik en sleep om verdeling te tekenen</div>
      </div>
    </div>

    <!-- Panel 2: Last sample -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Meest recente steekproef</span>
        <div class="panel-stats" id="sampleStats"></div>
      </div>
      <div class="chart-wrap">
        <canvas id="sampleChart"></canvas>
      </div>
    </div>

    <!-- Panel 3: Sampling distribution -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Steekproevenverdeling van <span id="statLabel">het Gemiddelde</span></span>
        <div class="panel-stats" id="sdStats"></div>
      </div>
      <div class="chart-wrap">
        <canvas id="sdChart"></canvas>
      </div>
    </div>

  </div><!-- /charts -->
</div><!-- /app -->

<script>
// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
let currentDist = 'normal';
let currentStat = 'mean';
let N = 10;
let samplingValues = [];   // accumulated statistic values
let sdValMin = Infinity, sdValMax = -Infinity;  // running extremes of samplingValues
let animFrameId = null;
let customBins = null;     // Array[30] of weights for custom dist
let animating = false;     // true while a falling-dot animation is running

const NUM_BINS = 40;               // bin width = 4 units
const POP_MIN = 20, POP_MAX = 180;
const BIN_W = (POP_MAX - POP_MIN) / NUM_BINS; // = 4

// X-bar rendered with CSS overline (more reliable cross-browser than combining char)
const XBAR  = '<i><span style="text-decoration:overline">X</span></i>';
// s_X and s_{X-bar} with italic subscripts
const SX    = 's<sub><i>X</i></sub>';
const SXBAR = 's<sub><i><span style="text-decoration:overline">X</span></i></sub>';

// ═══════════════════════════════════════════
//  Utilities / Math
// ═══════════════════════════════════════════
function randNormal(mu=100, sigma=20) {
  let u, v;
  do { u = Math.random(); } while (u === 0);
  do { v = Math.random(); } while (v === 0);
  return mu + sigma * Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
}

function randUniform(a=POP_MIN, b=POP_MAX) {
  return a + Math.random() * (b - a);
}

// Right-skewed via exponential transform scaled to [0,200]
function randSkewed() {
  const lambda = 0.03;
  const x = -Math.log(1 - Math.random()) / lambda;
  return Math.min(x, 200);
}

function randBimodal() {
  return Math.random() < 0.5 ? randNormal(60, 16) : randNormal(140, 16);
}

function randCustom() {
  const total = customBins.reduce((a,b) => a+b, 0);
  if (total === 0) return randUniform();
  let r = Math.random() * total, cum = 0;
  for (let i = 0; i < NUM_BINS; i++) {
    cum += customBins[i];
    if (r <= cum) return POP_MIN + (i + Math.random()) * BIN_W;
  }
  return POP_MAX;
}

function drawValue() {
  switch(currentDist) {
    case 'normal':  return Math.max(POP_MIN, Math.min(POP_MAX, randNormal()));
    case 'uniform': return randUniform();
    case 'skewed':  return randSkewed();
    case 'bimodal': return Math.max(POP_MIN, Math.min(POP_MAX, randBimodal()));
    case 'custom':  return randCustom();
  }
}

function drawSample(n) {
  const vals = [];
  for (let i = 0; i < n; i++) vals.push(drawValue());
  return vals;
}

// ── Statistics ──
const mean   = a => a.reduce((s,x)=>s+x,0)/a.length;
const median = a => { const s=[...a].sort((x,y)=>x-y), m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; };
const variance = a => { const mu=mean(a); return mean(a.map(x=>(x-mu)**2)); };
const sd     = a => Math.sqrt(variance(a));
const mad    = a => { const mu=mean(a); return mean(a.map(x=>Math.abs(x-mu))); };
const range  = a => Math.max(...a) - Math.min(...a);

const statFns = { mean, median, sd, variance, mad, range };
const statNames = {
  mean: 'Gemiddelde', median: 'Mediaan', sd: 'Standaardafwijking',
  variance: 'Variantie', mad: 'MAD', range: 'Bereik'
};
const statArticles = {
  mean: 'het', median: 'de', sd: 'de',
  variance: 'de', mad: 'de', range: 'het'
};

function computeStat(arr) { return statFns[currentStat](arr); }

// Push a new stat value and keep running extremes up to date.
function pushStatValue(v) {
  if (v < sdValMin) sdValMin = v;
  if (v > sdValMax) sdValMax = v;
  samplingValues.push(v);
}

// Return the x-axis range for the sampling distribution chart.
// For location statistics (mean, median) use [POP_MIN, POP_MAX] so the
// sampling distribution can be compared directly with the population panel.
// For spread statistics (sd, variance, mad, range) derive the range from the
// actual data; all spread statistics are non-negative so the lower bound is
// clamped to 0.
function getSdChartRange() {
  if (currentStat === 'mean' || currentStat === 'median') return [POP_MIN, POP_MAX];
  if (samplingValues.length === 0) return [0, 1];
  const span = (sdValMax - sdValMin) || 1;
  return [Math.max(0, sdValMin - span * 0.15), sdValMax + span * 0.15];
}

function toBins(values, min, max, nBins) {
  const counts = new Array(nBins).fill(0);
  const w = (max - min) / nBins;
  values.forEach(v => {
    const i = Math.min(nBins-1, Math.floor((v - min) / w));
    if (i >= 0) counts[i]++;
  });
  return counts;
}

function binLabels(min, max, nBins) {
  // Use left-edge labels (integers) so multiples of 10 land exactly on ticks
  const w = (max - min) / nBins;
  return Array.from({length: nBins}, (_, i) => String(Math.round(min + i * w)));
}

// Variant of binLabels for the sampling distribution of spread statistics.
// Uses enough decimal places so all 40 labels are distinct — Math.round() fails
// for narrow ranges (e.g. sd ≈ 15–25, binW ≈ 0.25) because adjacent bins
// round to the same integer, causing Chart.js to collapse them.
function sdBinLabels(min, max, nBins) {
  const w  = (max - min) / nBins;
  const dp = w >= 1 ? 0 : Math.max(1, Math.ceil(-Math.log10(w)));
  return Array.from({length: nBins}, (_, i) => (min + i * w).toFixed(dp));
}

function normalPdf(x, mu, sigma) {
  return (1/(sigma*Math.sqrt(2*Math.PI))) * Math.exp(-0.5*((x-mu)/sigma)**2);
}

// Complementary error function (Abramowitz & Stegun, max error 1.5e-7)
function erfc(x) {
  const t = 1 / (1 + 0.3275911 * Math.abs(x));
  const p = t * (0.254829592 + t * (-0.284496736 +
            t * (1.421413741 + t * (-1.453152027 + t * 1.061405429))));
  const r = p * Math.exp(-x * x);
  return x >= 0 ? r : 2 - r;
}
function normalCdf(x, mu, sigma) {
  return 0.5 * erfc(-(x - mu) / (sigma * Math.SQRT2));
}

// ═══════════════════════════════════════════
//  Chart.js setup
// ═══════════════════════════════════════════
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
Chart.defaults.font.size = 11;

// Darkorange palette for three charts
const C1 = '#FF8C00'; // darkorange  — population
const C2 = '#D45500'; // burnt orange — sample
const C3 = '#FFA833'; // golden orange — sampling dist

function makeChart(id, color) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels: [],
      datasets: [{
        label: 'Frequentie',
        data: [],
        backgroundColor: color + 'bb',
        borderColor: color,
        borderWidth: 1,
        borderRadius: 2,
        categoryPercentage: 1.0,
        barPercentage: 1.0,
      },{
        label: 'Normale verdeling',
        data: [],
        type: 'line',
        borderColor: '#c1121f',
        borderWidth: 2,
        pointRadius: 0,
        fill: false,
        tension: 0.3,     // smooth Bezier through CDF-based control points
        hidden: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 120 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => `${items[0].label}–${parseInt(items[0].label) + BIN_W}`,
            label: item => item.datasetIndex===0 ? `Aantal: ${item.raw}` : `Dichtheid: ${item.raw?.toFixed?.(4) ?? item.raw}`
          }
        }
      },
      scales: {
        x:  { grid: { display: false }, ticks: {
                maxRotation: 0,
                callback: function(val, index) {
                  const num = parseInt(this.getLabelForValue(val));
                  return num % 10 === 0 ? num : null;
                }
              }},
        y:  { grid: { color: '#f5e6d0' }, ticks: { maxTicksLimit: 5 }, beginAtZero: true }
      }
    }
  });
}

const popChart    = makeChart('popChart',    C1);
const sampleChart = makeChart('sampleChart', C2);
const sdChart     = makeChart('sdChart',     C3);

// Shared x-axis labels (same for all three panels)
const SHARED_LABELS = binLabels(POP_MIN, POP_MAX, NUM_BINS);

// Exact analytical population parameters (null = estimate from simulated bins)
const EXACT_POP_STATS = {
  normal:  { mu: 100, sigma: 20 },
  uniform: { mu: (POP_MIN + POP_MAX) / 2,
             sigma: (POP_MAX - POP_MIN) / Math.sqrt(12) },
  // bimodal: mixture of N(60,16) and N(140,16) with equal weights
  bimodal: { mu: 100,
             sigma: Math.sqrt(16**2 + ((60-100)**2 + (140-100)**2) / 2) },
  skewed:  null,   // no closed form after capping — estimate from bins
  custom:  null,   // user-drawn — estimate from bins
};

// ═══════════════════════════════════════════
//  Overlay canvas for falling-dot animation
// ═══════════════════════════════════════════
// A transparent canvas stretched over the entire .charts column.
// Dots are drawn here so they can travel across panel boundaries.
const chartsCol = document.getElementById('chartsCol');
const overlayCanvas = document.createElement('canvas');
overlayCanvas.style.cssText =
  'position:absolute; top:0; left:0; pointer-events:none; z-index:10;';
chartsCol.appendChild(overlayCanvas);

function resizeOverlay() {
  // Match the overlay exactly to the charts column in CSS pixels.
  // getBoundingClientRect is used later for coordinate mapping,
  // so we only need the canvas drawing surface to match that size.
  overlayCanvas.width  = chartsCol.offsetWidth;
  overlayCanvas.height = chartsCol.offsetHeight;
}
resizeOverlay();
window.addEventListener('resize', resizeOverlay);

// ═══════════════════════════════════════════
//  Animation helpers
// ═══════════════════════════════════════════
const DOT_STATIC   = 300;   // ms: dot is shown statically at source x-axis before falling
const DOT_DURATION = 300;   // ms: duration of one dot's fall animation

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// Returns the bin index for a value on the shared [POP_MIN, POP_MAX] axis.
function getBinIdx(value) {
  return Math.min(NUM_BINS - 1, Math.max(0,
    Math.floor((value - POP_MIN) / BIN_W)));
}

// Returns the center x pixel of a bar (bin binIdx) within a chart's canvas.
// Falls back to a linear interpolation if bar metadata is not yet available.
function getBarCenterX(chart, binIdx) {
  const meta = chart.getDatasetMeta(0);
  if (meta && meta.data && meta.data[binIdx]) {
    return meta.data[binIdx].x;
  }
  const ca = chart.chartArea;
  return ca.left + (binIdx + 0.5) / NUM_BINS * (ca.right - ca.left);
}

// Draw a filled darkorchid dot on the overlay canvas.
function drawDot(ctx, x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'darkorchid';
  ctx.fill();
}

// Animate a single value falling from fromChart to toChart.
// Phase 1 (DOT_STATIC ms): dot appears statically on the x-axis of fromChart.
// Phase 2 (DOT_DURATION ms): dot falls with ease-in to the x-axis of toChart.
async function animateDotFall(value, fromChart, toChart) {
  const binIdx = getBinIdx(value);

  // All positions in viewport pixels (scroll-invariant after subtraction)
  const overlayRect    = overlayCanvas.getBoundingClientRect();
  const fromCanvasRect = fromChart.canvas.getBoundingClientRect();
  const toCanvasRect   = toChart.canvas.getBoundingClientRect();

  // Start: x-axis (bottom) of the source chart at the correct bin
  const fromX = fromCanvasRect.left - overlayRect.left + getBarCenterX(fromChart, binIdx);
  const fromY = fromCanvasRect.top  - overlayRect.top  + fromChart.chartArea.bottom;

  // End: x-axis (bottom) of the destination chart at the correct bin
  const toX = toCanvasRect.left - overlayRect.left + getBarCenterX(toChart, binIdx);
  const toY = toCanvasRect.top  - overlayRect.top  + toChart.chartArea.bottom;

  const ctx = overlayCanvas.getContext('2d');

  // Phase 1: show dot statically at source x-axis
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  drawDot(ctx, fromX, fromY);
  await sleep(DOT_STATIC);

  // Phase 2: animate fall to destination x-axis
  const startTime = performance.now();
  return new Promise(resolve => {
    function frame(now) {
      const t      = Math.min(1, (now - startTime) / DOT_DURATION);
      const easedY = t * t;   // ease-in: accelerates downward like gravity

      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      drawDot(ctx,
        fromX + (toX - fromX) * t,       // linear horizontal motion
        fromY + (toY - fromY) * easedY    // accelerating vertical motion
      );

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

// Animate the statistic falling from fromChart (sample) to toChart (sampling dist).
// Phase 1 (DOT_STATIC ms): vertical dotted line drawn at statVal in fromChart.
// Phase 2 (DOT_STATIC ms): dot added on the x-axis at statVal (line stays visible).
// Phase 3 (DOT_DURATION ms): line disappears, dot falls to x-axis of toChart.
async function animateStatFall(statVal, fromChart, toChart) {
  const binIdx = getBinIdx(statVal);

  const overlayRect    = overlayCanvas.getBoundingClientRect();
  const fromCanvasRect = fromChart.canvas.getBoundingClientRect();
  const toCanvasRect   = toChart.canvas.getBoundingClientRect();

  const fromOffL = fromCanvasRect.left - overlayRect.left;
  const fromOffT = fromCanvasRect.top  - overlayRect.top;

  const lineX   = fromOffL + getBarCenterX(fromChart, binIdx);
  const lineTop = fromOffT + fromChart.chartArea.top;
  const lineBot = fromOffT + fromChart.chartArea.bottom;

  const ctx = overlayCanvas.getContext('2d');

  // Helper: draw the vertical dashed mean line
  function drawMeanLine() {
    ctx.save();
    ctx.beginPath();
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = 'darkorchid';
    ctx.lineWidth = 2;
    ctx.moveTo(lineX, lineTop);
    ctx.lineTo(lineX, lineBot);
    ctx.stroke();
    ctx.restore();
  }

  // Phase 1: vertical dotted line only
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  drawMeanLine();
  await sleep(DOT_STATIC);

  // Phase 2: line + dot at x-axis
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  drawMeanLine();
  drawDot(ctx, lineX, lineBot);
  await sleep(DOT_STATIC);

  // Phase 3: dot falls, line disappears
  const toX = toCanvasRect.left - overlayRect.left + getBarCenterX(toChart, binIdx);
  const toY = toCanvasRect.top  - overlayRect.top  + toChart.chartArea.bottom;

  const startTime = performance.now();
  return new Promise(resolve => {
    function frame(now) {
      const t      = Math.min(1, (now - startTime) / DOT_DURATION);
      const easedY = t * t;

      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      drawDot(ctx,
        lineX + (toX - lineX) * t,
        lineBot + (toY - lineBot) * easedY
      );

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

// Lock/unlock all draw and clear buttons during animation
function setButtonsDisabled(disabled) {
  ['btn1','btn10','btn1000','btn10000','btnClear'].forEach(id => {
    document.getElementById(id).disabled = disabled;
  });
}

// Animated Trek 1: values fall one by one from population → sample,
// then the computed statistic falls from sample → sampling distribution.
// Only triggered when "Animeer trekking" is checked and Trek 1 is used.
async function drawSampleAnimated() {
  if (animating) return;
  animating = true;
  setButtonsDisabled(true);

  const sample = drawSample(N);

  // Clear sample chart and stats before animating
  const bins = new Array(NUM_BINS).fill(0);
  sampleChart.data.labels = SHARED_LABELS;
  sampleChart.data.datasets[0].data = [...bins];
  sampleChart.data.datasets[1].data = [];
  sampleChart.data.datasets[1].hidden = true;
  sampleChart.update('none');
  document.getElementById('sampleStats').innerHTML = '';

  // Step 1: each sampled value appears on the population x-axis, then falls to the sample panel
  for (const value of sample) {
    await animateDotFall(value, popChart, sampleChart);

    // Increment the corresponding bin and redraw immediately after landing
    bins[getBinIdx(value)]++;
    sampleChart.data.datasets[0].data = [...bins];
    sampleChart.update('none');
  }

  // Update sample statistics header
  const statVal = computeStat(sample);
  const mu  = mean(sample);
  const sig = sd(sample);
  const extraStat = (currentStat !== 'mean' && currentStat !== 'sd')
    ? `<span class="stat">${statNames[currentStat]}: <b>${statVal.toFixed(2)}</b></span>`
    : '';
  document.getElementById('sampleStats').innerHTML =
    `<span class="stat"><i>n</i>: <b>${sample.length}</b></span>
     <span class="stat">${XBAR}: <b>${mu.toFixed(2)}</b></span>
     <span class="stat">${SX}: <b>${sig.toFixed(2)}</b></span>
     ${extraStat}`;

  // Step 2: animate stat falling to sampling distribution.
  // Only for mean and median: the sample and sampling-distribution panels share
  // the same x-axis scale, so the falling dot lands in a meaningful position.
  // For spread statistics (sd, variance, mad, range) the scales differ, so we
  // skip the cross-panel animation and update the chart directly.
  if (currentStat === 'mean' || currentStat === 'median') {
    await animateStatFall(statVal, sampleChart, sdChart);
  }

  pushStatValue(statVal);
  renderSamplingDist();
  document.getElementById('nDrawn').textContent = samplingValues.length;

  setButtonsDisabled(false);
  animating = false;
}

// ═══════════════════════════════════════════
//  Render population
// ═══════════════════════════════════════════
function getPopulationBins() {
  if (currentDist === 'custom' && customBins) {
    return customBins.map(v => Math.round(v));
  }
  const N_SIM = 50000;
  const vals = Array.from({length: N_SIM}, drawValue);
  return toBins(vals, POP_MIN, POP_MAX, NUM_BINS);
}

function renderPopulation() {
  const bins = getPopulationBins();
  popChart.data.labels = SHARED_LABELS;
  popChart.data.datasets[0].data = bins;
  popChart.data.datasets[1].data = [];
  popChart.data.datasets[1].hidden = true;
  popChart.update();

  let mu, sigma;
  const exact = EXACT_POP_STATS[currentDist];
  if (exact) {
    mu = exact.mu;
    sigma = exact.sigma;
  } else {
    // Estimate from simulated bins
    let total=0, wSum=0, wSum2=0;
    bins.forEach((c,i) => {
      const midVal = POP_MIN + (i+0.5)*BIN_W;
      total += c; wSum += c*midVal; wSum2 += c*midVal*midVal;
    });
    mu = wSum/total;
    sigma = Math.sqrt(wSum2/total - mu*mu);
  }
  document.getElementById('popStats').innerHTML =
    `<span class="stat">μ<sub>X</sub>: <b>${mu.toFixed(1)}</b></span>
     <span class="stat">σ<sub>X</sub>: <b>${sigma.toFixed(1)}</b></span>`;
}

// ═══════════════════════════════════════════
//  Render sample
// ═══════════════════════════════════════════
function renderSample(sampleVals) {
  const bins = toBins(sampleVals, POP_MIN, POP_MAX, NUM_BINS);
  sampleChart.data.labels = SHARED_LABELS;
  sampleChart.data.datasets[0].data = bins;
  sampleChart.data.datasets[1].data = [];
  sampleChart.data.datasets[1].hidden = true;
  sampleChart.update();

  const statVal = computeStat(sampleVals);
  const mu = mean(sampleVals);
  const sig = sd(sampleVals);

  // Only show extra stat when it isn't already displayed as X̄ or s_X
  const extraStat = (currentStat !== 'mean' && currentStat !== 'sd')
    ? `<span class="stat">${statNames[currentStat]}: <b>${statVal.toFixed(2)}</b></span>`
    : '';

  document.getElementById('sampleStats').innerHTML =
    `<span class="stat"><i>n</i>: <b>${sampleVals.length}</b></span>
     <span class="stat">${XBAR}: <b>${mu.toFixed(2)}</b></span>
     <span class="stat">${SX}: <b>${sig.toFixed(2)}</b></span>
     ${extraStat}`;
}

// ═══════════════════════════════════════════
//  Render sampling distribution
// ═══════════════════════════════════════════
function renderSamplingDist() {
  if (samplingValues.length === 0) {
    sdChart.data.labels = SHARED_LABELS;
    sdChart.data.datasets[0].data = new Array(NUM_BINS).fill(0);
    sdChart.data.datasets[1].data = [];
    sdChart.data.datasets[1].hidden = true;
    sdChart.update();
    document.getElementById('sdStats').innerHTML = '';
    return;
  }

  // Use [POP_MIN, POP_MAX] for location stats; data-driven range for spread stats.
  const [sdMin, sdMax] = getSdChartRange();
  const sdBinW   = (sdMax - sdMin) / NUM_BINS;
  const bins     = toBins(samplingValues, sdMin, sdMax, NUM_BINS);
  const sdLabels = sdBinLabels(sdMin, sdMax, NUM_BINS);

  sdChart.data.labels = sdLabels;
  sdChart.data.datasets[0].data = bins;

  // Tick callback: show ~5 evenly spaced labels; format as integer or 1 dp.
  sdChart.options.scales.x.ticks.callback = function(val, index) {
    if (index % Math.max(1, Math.round(NUM_BINS / 5)) !== 0) return null;
    const num = parseFloat(this.getLabelForValue(val));
    return isNaN(num) ? null : (Number.isInteger(num) ? num : +num.toFixed(1));
  };

  const fitNormal = document.getElementById('chkFitNormal').checked;
  if (fitNormal && samplingValues.length > 1) {
    const mu = mean(samplingValues);
    const sigma = sd(samplingValues);
    const N_samp = samplingValues.length;
    const curveData = Array.from({length: NUM_BINS}, (_, i) => {
      const xLeft  = sdMin + i       * sdBinW;
      const xRight = sdMin + (i + 1) * sdBinW;
      return N_samp * (normalCdf(xRight, mu, sigma) - normalCdf(xLeft, mu, sigma));
    });
    sdChart.data.datasets[1].data = curveData;
    sdChart.data.datasets[1].hidden = false;
    const analyticalPeak = Math.max(...curveData);
    const yMax = Math.max(Math.max(...bins), analyticalPeak) * 1.15;
    sdChart.options.scales.y.max = yMax;
  } else {
    sdChart.data.datasets[1].data = [];
    sdChart.data.datasets[1].hidden = true;
    sdChart.options.scales.y.max = undefined; // revert to auto-scale
  }

  sdChart.update();

  const mu = mean(samplingValues);
  const sig = sd(samplingValues);
  document.getElementById('sdStats').innerHTML =
    `<span class="stat"><i>n</i>: <b>${samplingValues.length}</b></span>
     <span class="stat">${XBAR}: <b>${mu.toFixed(3)}</b></span>
     <span class="stat">${SXBAR}: <b>${sig.toFixed(3)}</b></span>`;
}

// ═══════════════════════════════════════════
//  Draw samples
// ═══════════════════════════════════════════
function drawSamples(count) {
  if (animating) return;
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }

  const doAnimate = document.getElementById('chkAnimate').checked;

  // Falling-dot animation: only for Trek 1 with "Animeer trekking" checked
  if (doAnimate && count === 1) {
    drawSampleAnimated();
    return;
  }

  // Rapid frame-by-frame animation for Trek 10 (original behaviour)
  const animate = doAnimate && count <= 50;

  if (animate) {
    let drawn = 0;
    function step() {
      const s = drawSample(N);
      pushStatValue(computeStat(s));
      drawn++;
      renderSample(s);
      renderSamplingDist();
      document.getElementById('nDrawn').textContent = samplingValues.length;
      if (drawn < count) animFrameId = requestAnimationFrame(step);
    }
    animFrameId = requestAnimationFrame(step);
  } else {
    let lastSample;
    for (let i = 0; i < count; i++) {
      lastSample = drawSample(N);
      pushStatValue(computeStat(lastSample));
    }
    renderSample(lastSample);
    renderSamplingDist();
    document.getElementById('nDrawn').textContent = samplingValues.length;
  }
}

function clearSampling() {
  if (animating) return;
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  samplingValues = [];
  sdValMin = Infinity; sdValMax = -Infinity;
  sampleChart.data.labels = SHARED_LABELS;
  sampleChart.data.datasets[0].data = new Array(NUM_BINS).fill(0);
  sampleChart.data.datasets[1].data = [];
  sampleChart.update();
  document.getElementById('sampleStats').innerHTML = '';
  renderSamplingDist();
  document.getElementById('nDrawn').textContent = '0';
}

// ═══════════════════════════════════════════
//  Controls
// ═══════════════════════════════════════════
function setDist(name) {
  currentDist = name;
  document.querySelectorAll('.btn-dist').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (name === 'custom') {
    customBins = new Array(NUM_BINS).fill(1);
    document.body.classList.add('custom-mode');
    setupCustomDrawing();
  } else {
    document.body.classList.remove('custom-mode');
  }

  clearSampling();
  renderPopulation();
}

function setStat(val) {
  currentStat = val;
  document.getElementById('statLabel').textContent =
    statArticles[val] + ' ' + statNames[val];
  clearSampling();
}

document.querySelectorAll('input[name="n"]').forEach(r => {
  r.addEventListener('change', () => { N = parseInt(r.value); clearSampling(); });
});

// ═══════════════════════════════════════════
//  Custom distribution drawing
// ═══════════════════════════════════════════
function setupCustomDrawing() {
  const wrap = document.getElementById('pop-canvas-wrap');
  let painting = false;

  function paint(e) {
    if (!painting || currentDist !== 'custom') return;
    const rect = wrap.getBoundingClientRect();
    const x = (e.clientX || e.touches?.[0].clientX) - rect.left;
    const frac = Math.max(0, Math.min(1, x / rect.width));
    const bin = Math.floor(frac * NUM_BINS);
    const y = (e.clientY || e.touches?.[0].clientY) - rect.top;
    const heightFrac = 1 - Math.max(0, Math.min(1, y / rect.height));
    customBins[bin] = Math.round(heightFrac * 200);
    renderPopulation();
  }

  wrap.addEventListener('mousedown',  e => { painting = true; paint(e); });
  wrap.addEventListener('mousemove',  paint);
  wrap.addEventListener('mouseup',    () => painting = false);
  wrap.addEventListener('mouseleave', () => painting = false);
}

// ═══════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════
renderPopulation();
// Initialize sample and sd charts with zero bins so bar metadata is available
// for getBarCenterX() before the first sample is drawn.
clearSampling();
</script>
